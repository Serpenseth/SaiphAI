name: Build and Release Electron App

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release'
        required: true
      draft:
        description: 'Create as draft release?'
        type: boolean
        default: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Bump version in package.json
        run: npm version ${{ github.event.inputs.version }} --no-git-tag-version --allow-same-version

      - name: Build Electron App
        run: npm run build -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: dist/
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Bump version in package.json
        run: npm version ${{ github.event.inputs.version }} --no-git-tag-version --allow-same-version

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and Push version bump
        run: |
          git add package.json package-lock.json
          # Check if there are changes to commit
          if ! git diff --staged --quiet; then
            git commit -m "chore: release version ${{ github.event.inputs.version }}"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Create Release
        run: |
            VERSION="${{ github.event.inputs.version }}"
            VERSION="${VERSION#v}"

            # Find all installer files (excluding debug YAML files)
            files=$(find artifacts -type f \( \
                -name "*.exe" -o \
                -name "*.dmg" -o \
                -name "*.AppImage" -o \
                -name "*.deb" -o \
                -name "*.rpm" -o \
                -name "*.zip" -o \
                -name "*.msi" -o \
                -name "*.pkg" \
            \) ! -name "*debug*" ! -name "latest-*.yml"  ! -name "elevate.exe" ! -name "SaiphAI.exe")

            if [ -z "$files" ]; then
                echo "No release files found!"
                exit 1
            fi

            gh release create "v${VERSION}" \
            --title "Release v${VERSION}" \
            --draft="${{ github.event.inputs.draft }}" \
            $files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
